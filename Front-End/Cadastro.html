<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pessoas</title>
    <link rel="stylesheet" href="Style/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav>
        <h3> AMATRAVEL </h3>
        <a href="Cadastro.html" class="ativo"> Pessoas </a>
        <a href="registro.html"> Registro </a>
        <a href="histórico.html"> Histórico</a>
        <a href="relatório.html"> Relatório </a>
    </nav>
    <h1> Cadastro de pessoas </h1>
    <div class="subtitle">
        <h3> Gerencie seus passageiros e valores de corrida </h3>
    </div>
    <button class="button_add" onclick="abrirModal()"> Adicionar </button>

    <!-- Modal de Cadastro -->
    <div id="modal_overlay" class="modal_overlay" style="display: none;">
        <div class="modal">
            <div class="modal_header">
                <h2>Novo Passageiro</h2>
                <button class="btn_fechar" onclick="fecharModal()">✕</button>
            </div>
            <div class="modal_campo">
                <label>Nome</label>
                <input type="text" id="input_nome" placeholder="Nome completo">
            </div>
            <div class="modal_campo">
                <label>Valor Ida (R$)</label>
                <input type="number" id="input_ida" step="0.50" placeholder="0,00">
            </div>
            <div class="modal_campo">
                <label>Valor Volta (R$)</label>
                <input type="number" id="input_volta" step="0.50" placeholder="0,00">
            </div>
            <div class="modal_buttons">
                <button class="btn_cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn_salvar">Salvar</button>
            </div>
        </div>
    </div>

    <div id="Lista_Pessoas"></div>
    <script>
        function criarCard(nome, ida, volta) {
            const lista = document.getElementById("Lista_Pessoas");
            const card = document.createElement("div");
            card.className = "Users";
            card.innerHTML = `
            <div class="user_card">
                <div class="user_text">
                    <h3>${nome}</h3>
                    <p>Ida: R$ ${ida} · Volta: R$ ${volta}</p>
                </div>
                <div class="container_button">
                    <button class="btn_editar">Editar</button>
                    <button class="btn_excluir">Excluir</button>
                </div>
            </div>
        `;
            lista.appendChild(card);
        }
        async function carregarPessoas() {
            const resposta = await fetch("http://localhost:3000/pessoas");
            const pessoas = await resposta.json();
            pessoas.forEach(p => criarCard(p.nome, p.valor_ida, p.valor_volta));
        }
        document.addEventListener("DOMContentLoaded", carregarPessoas);

        function abrirModal() {
            document.getElementById("modal_overlay").style.display = "flex";
        }
        function fecharModal() {
            document.getElementById("modal_overlay").style.display = "none";
        }
    </script>
</body>

</html>
