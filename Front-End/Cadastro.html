<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pessoas</title>
    <link rel="stylesheet" href="Style/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav>
        <h3> AMATRAVEL </h3>
        <a href="Cadastro.html" class="ativo"> Pessoas </a>
        <a href="registro.html"> Registro </a>
        <a href="histórico.html"> Histórico</a>
        <a href="relatório.html"> Relatório </a>
    </nav>
    <div class="page_header">
        <div class="page_title">
            <h1> Cadastro de pessoas </h1>
            <div class="subtitle">
                <h3> Gerencie seus passageiros e valores de corrida </h3>
            </div>
        </div>
        <button class="button_add" onclick="abrirModal()">➕ Novo Passageiro</button>
    </div>

    <!-- Modal de Cadastro -->
    <div id="modal_overlay" class="modal_overlay" style="display: none;">
        <div class="modal">
            <div class="modal_header">
                <h2>Novo Passageiro</h2>
                <button class="btn_fechar" onclick="fecharModal()">✕</button>
            </div>
            <div class="modal_campo">
                <label>Nome</label>
                <input type="text" id="input_nome" placeholder="Nome completo">
            </div>
            <div class="modal_campo">
                <label>Valor Ida (R$)</label>
                <input type="number" id="input_ida" step="0.50" placeholder="0,00">
            </div>
            <div class="modal_campo">
                <label>Valor Volta (R$)</label>
                <input type="number" id="input_volta" step="0.50" placeholder="0,00">
            </div>
            <div class="modal_buttons">
                <button class="btn_cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn_salvar" onclick="SalvarPessoa()">Salvar</button>
            </div>
        </div>
    </div>

    <div id="Lista_Pessoas"></div>
    <script>

        let editandopessoa = null;

        function criarCard(id, nome, ida, volta) {
            const lista = document.getElementById("Lista_Pessoas");
            const card = document.createElement("div");
            card.className = "Users";
            card.innerHTML = `
            <div class="user_card">
                <div class="user_text">
                    <h3>${nome}</h3>
                    <p class="prices">
                        <span class="badge badge-ida">Ida: R$ ${ida}</span>
                        <span class="badge badge-volta">Volta: R$ ${volta}</span>
                    </p>
                </div>
                <div class="container_button">
                    <button class="btn_editar" onclick="editarpessoa(${id}, '${nome}', ${ida}, ${volta})">✏️ Edit</button>
                    <button class="btn_excluir" onclick="ExcluirPessoa(${id})">🗑️ Delete</button>
                </div>
            </div>
        `;
            lista.appendChild(card);
        }
        async function carregarPessoas() {
            const resposta = await fetch("/pessoas");
            const pessoas = await resposta.json();
            pessoas.forEach(p => criarCard(p.id, p.nome, p.valor_ida, p.valor_volta));
        }
        document.addEventListener("DOMContentLoaded", carregarPessoas);

        function abrirModal() {
            document.getElementById("modal_overlay").style.display = "flex";
        }
        function fecharModal() {
            document.getElementById("modal_overlay").style.display = "none";
        }

        function editarpessoa(id, nome, ida, volta) {
            // atribuindos as variaveis de edição
            editandopessoa = id;
            document.getElementById("input_nome").value = nome;
            document.getElementById("input_ida").value = ida;
            document.getElementById("input_volta").value = volta;
            abrirModal();
        }

        async function SalvarPessoa() {
            const nome = document.getElementById("input_nome").value;
            const ida = document.getElementById("input_ida").value;
            const volta = document.getElementById("input_volta").value;

            if (editandopessoa) {
                // if para caso eu esteja editando -> usa o PUT
                await fetch(`/pessoas/${editandopessoa}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ nome, ida, volta })
                });
            } else {
                // else para caso eu esteja cadastrando -> usa o POST
                await fetch("/pessoas", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ nome, ida, volta })
                })
            };
            editandopessoa = null;
            // reseta a pessoa que foi escolhida para editar o cadastrar
            fecharModal();
            document.getElementById("Lista_Pessoas").innerHTML = "";
            carregarPessoas();
            //fecha o modal e carrega a lista de pessoas atuais

        }

        async function ExcluirPessoa(id) {
            await fetch(`/pessoas/${id}`, {
                method: "DELETE",
            });

            document.getElementById("Lista_Pessoas").innerHTML = "";
            carregarPessoas();
        }

    </script>
</body>

</html>
